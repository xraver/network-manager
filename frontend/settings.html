<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Network Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5.x CSS (CDN) -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Boostrap override -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
</head>

<body>
    <!-- Topbar -->
    <header class="topbar">
        <div class="topbar-inner">
            <a href="/home" class="logo text-decoration-none">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="var(--accent)" aria-hidden="true">
                    <circle cx="12" cy="4" r="2"></circle>
                    <circle cx="4" cy="12" r="2"></circle>
                    <circle cx="20" cy="12" r="2"></circle>
                    <circle cx="12" cy="20" r="2"></circle>
                    <line x1="12" y1="6" x2="12" y2="18" stroke="var(--accent)" stroke-width="2"></line>
                    <line x1="6" y1="12" x2="18" y2="12" stroke="var(--accent)" stroke-width="2"></line>
                </svg>
                <span>Network Manager</span>
            </a>

            <nav class="navbar">
                <!-- Hamburger -->
                <button
                    class="btn btn-primary d-md-none"
                    type="button"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#mobileMenu">
                    <i class="bi bi-list fs-4"></i>
                </button>

                <!-- Desktop nav -->
                <div class="d-none d-md-flex gap-2 ms-auto">
                        <a href="/hosts"    class="btn btn-primary">       Hosts</a>
                        <a href="/aliases"  class="btn btn-primary">       Alias</a>
                        <a href="/leases"   class="btn btn-primary">       DHCP Leases</a>
                        <a href="/devices"  class="btn btn-primary">       Devices</a>
                        <a href="/settings" class="btn btn-primary active">Settings</a>
                        <button class="btn btn-primary btn-logout">Logout</button>
                </div>
            </nav>

            <!-- Mobile offcanvas -->
            <div class="offcanvas offcanvas-end d-md-none" tabindex="-1" id="mobileMenu">

                <div class="offcanvas-header">
                    <h5 class="offcanvas-title">Network Manager</h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="offcanvas">
                    </button>
                </div>

                <div class="offcanvas-body">
                    <div class="d-grid gap-2">
                        <a href="/hosts"    class="btn btn-primary">       Hosts</a>
                        <a href="/aliases"  class="btn btn-primary">       Alias</a>
                        <a href="/leases"   class="btn btn-primary">       DHCP Leases</a>
                        <a href="/devices"  class="btn btn-primary">       Devices</a>
                        <a href="/settings" class="btn btn-primary active">Settings</a>
                        <button class="btn btn-primary btn-logout">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Toast -->
    <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <!-- Toolbar / Section header -->
    <section class="page-frame">
        <div class="container-fluid p-0">
            <div class="row g-2 align-items-center">

                <!-- Title -->
                <div class="col-12 col-md-auto">
                    <h2 class="mb-0 d-flex align-items-center gap-2 lh-1">
                        <span class="title-icon"><i class="bi bi-gear"></i></span>
                        <span class="section-title">Configuration Parameter List</span>
                    </h2>
                </div>

                <!-- Spacer -->
                <div class="col d-none d-md-block"></div>

                <!-- Search Desktop -->
                <div class="col-12 col-md-auto d-none d-md-block">
                    <div class="search-wrapper">
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="Search..."
                            class="form-control form-control-sm placeholder-italic"
                            aria-label="Search config">
                    </div>
                </div>

                <!-- Bottoni -->
                <div class="col-12 col-md-auto d-flex align-items-center gap-2 flex-wrap">

                    <!-- Search Mobile -->
                    <div class="col-auto d-md-none">
                        <button
                                class="btn btn-primary d-flex align-items-center gap-2 px-3"
                                data-bs-toggle="collapse" data-bs-target="#mobileSearch"
                                aria-expanded="false" aria-controls="mobileSearch">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>

                    <!-- Separator -->
                    <div class="vr mx-2 d-none d-md-block"></div>

                    <!-- Expand -->
                    <button id="expandAllBtn"
                            class="btn btn-sm btn-primary d-flex align-items-center gap-2 px-3"
                            title="Expand all groups"
                            aria-label="Expand all groups">
                        <i class="bi bi-arrows-expand"></i>
                        <span class="label d-none d-md-block">Expand</span>
                    </button>

                    <!-- Collapse -->
                    <button id="collapseAllBtn"
                            class="btn btn-sm btn-primary d-flex align-items-center gap-2 px-3"
                            title="Collapse all groups"
                            aria-label="Collapse all groups">
                        <i class="bi bi-arrows-collapse"></i>
                        <span class="label d-none d-md-block">Collapse</span>
                    </button>

                    <!-- Separator -->
                    <div class="vr mx-2 d-none d-md-block"></div>

                    <!-- Restart -->
                    <button class="btn btn-danger d-flex align-items-center gap-2 px-3"
                            title="Restart system"
                            aria-label="Restart system"
                            data-action="restartApp">
                        <i class="bi bi-arrow-repeat"></i>
                        <span class="label d-none d-md-block">Restart</span>
                    </button>
                </div>
            </div>

            <!-- Search collapsabile -->
            <div class="collapse mt-2 d-md-none" id="mobileSearch">
                <input
                    type="text"
                    id="searchInputMobile"
                    placeholder="Search..."
                    class="form-control form-control-sm placeholder-italic"
                    aria-label="Search config">
            </div>
        </div>
    </section>

    <!-- Tabella responsive -->
    <div id="tableWrapper" class="table-responsive mobile-scroll d-none">
        <table id="dataTable" class="table table-bordered table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th data-type="string" data-sortable="false">
                        Parameter <span class="sort-arrow" aria-hidden="true"></span>
                    </th>

                    <th data-type="string" data-sortable="false">
                        Value <span class="sort-arrow" aria-hidden="true"></span>
                    </th>

                    <th data-type="string" data-sortable="false">
                        Description <span class="sort-arrow" aria-hidden="true"></span>
                    </th>

                    <th data-type="string" data-sortable="false" class="text-center text-nowrap">
                        Actions <span class="sort-arrow invisible" aria-hidden="true"></span>
                    </th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Loader -->
    <div id="loader" class="text-center my-3" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
    <div id="devices-container"></div>

    <!-- Modals -->
    <div id="modals-container"></div>

    <!-- Scripts -->
    <script type="module" src="js/settings.js"></script>
    <script type="module" src="js/session.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
</body>
</html>
